<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare — TorchEBM Benchmarks</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <svg class="nav-logo" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
            <a href="index.html" class="nav-title">TorchEBM Benchmarks</a>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Dashboard</a>
            <a href="history.html" class="nav-link">History</a>
            <a href="compare.html" class="nav-link active">Compare</a>
            <a href="https://github.com/soran-ghaderi/torchebm" class="nav-link nav-external" target="_blank" rel="noopener">
                <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                GitHub
            </a>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            </button>
        </div>
    </nav>

    <main class="container">
        <section class="hero">
            <h1>Compare Runs</h1>
            <p class="hero-sub">Side-by-side comparison of two benchmark runs</p>
        </section>

        <div id="loading" class="loading">Loading benchmark data...</div>

        <section class="compare-controls" id="compareControls" style="display:none">
            <div class="select-group">
                <label for="baselineSelect">Baseline Run</label>
                <select id="baselineSelect" class="select"></select>
            </div>
            <div class="compare-arrow">&rarr;</div>
            <div class="select-group">
                <label for="currentSelect">Current Run</label>
                <select id="currentSelect" class="select"></select>
            </div>
            <button class="btn-compare" id="btnCompare">Compare</button>
        </section>

        <section class="chart-section" id="compareEnvSection" style="display:none">
            <h2>Environment Comparison</h2>
            <div class="table-wrapper" id="envDiffTable"></div>
        </section>

        <section class="chart-section" id="compareBenchSection" style="display:none">
            <h2>Benchmark Comparison</h2>
            <div class="table-wrapper" id="benchDiffTable"></div>
        </section>

        <section class="chart-section" id="compareChartSection" style="display:none">
            <h2>Speedup by Component</h2>
            <div class="chart-container" id="chartSpeedup"></div>
        </section>

        <section class="compare-summary" id="compareSummary" style="display:none">
            <div class="summary-grid" id="compareSummaryGrid"></div>
        </section>
    </main>

    <footer class="footer">
        <p id="footerText">Data from <a href="https://github.com/soran-ghaderi/torchebm-benchmarks">torchebm-benchmarks</a>.</p>
    </footer>

    <script src="assets/app.js"></script>
</body>
</html>
